<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work for Us - Hot Beans</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <header>
        <div class="top-bar">
            <img src="logo.png" alt="Hot Beans Logo" class="logo">
            <h1>Work for Us</h1>
        </div>
        <hr>
        <nav>
            <a href="index.html">home</a>
            <a href="apply now.html">Back</a>
            <a href="about us.html">contact</a>
        
    </header>

    <main>
        <div class="container">
            <h1>Apply for a Job</h1>
            <p>Join the Hot Beans team! Please fill out the form below to submit your application.</p>
            <form id="applicationForm">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="job">Position Applied For:</label>
                    <select id="job" name="job" required>
                        <option value="">Select a position</option>
                        <option value="developer">Web Developer</option>
                        <option value="ui-ux">UI/UX Designer</option>
                        <option value="marketing">Marketing Specialist</option>
                        <option value="project-manager">Project Manager</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="cv">Upload Your CV:</label>
                    <input type="file" id="cv" name="cv" accept=".pdf,.doc,.docx" required>
                </div>

                <button type="submit" class="submit-btn">Submit Application</button>
            </form>
        </div>
    </main>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Application Submitted!</h2>
            <p>Thank you for your application. We will review it and get back to you soon.</p>
            <button id="redirectBtn" class="btn">Return to Apply Now</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Hot Beans. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
